<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While Exemplo</title>
</head>
<body>
    <script>
        let num = 10; //declara variável num com let, pois el apode ser alterada

        while(num>0) {                      //cria laço de repetição (faça...)
            console.log(num);               //faz a impressão da contagem
            num--;                           //decrementa o contador
        }
    </script>
</body>
</html>
