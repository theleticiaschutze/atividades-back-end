<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>leitor de triangulo</title>
</head>

<body>
    <h1>Insira os lados do triangulo e veja o tipo</h1>
    <table>
        <th>
        <td>lados iguais</td>
        <td>tipo</td>
        </th>
        <tr>
            <td>0</td>
            <td>escaleno</td>
        </tr>
        <tr>
            <td>2</td>
            <td>isósceles</td>
        </tr>
        <tr>
            <td>3</td>
            <td>esquilátero</td>
        </tr>
    </table>
    <form>
        <p>Lado 01:
            <input type="text" id="il1" required>
        <p>Lado 02:
            <input type="text" id="il2" required>
        <p>Lado 03:
            <input type="text" id="il3" required>
        </p>
        <input type="submit" value="Calcule">
    </form>
    <h3></h3>

    <script src="js/triangulo.js"></script>

</body>

</html>
