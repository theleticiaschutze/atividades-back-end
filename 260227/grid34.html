<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid para layouts 3/4</title>
    <!--O bootstrap ´edividido em 12 colunas -->
    <link href="css/bootstrap.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <!--Exemplo 01: Duas colunas iguais (metade da tela cada)-->
        <div class="row">
            <div class="col-6">Esta ocupa 6 colunas (50%)</div>
            <div class="col-6">Esta ocupa 6 colunas (50%)</div>
        </div>
        <br><br><br>
        <div class="row">
            <!--Exemplo 02: Três colunas iguais (um terço da tela cada)-->
            <div class="col-4">Esta ocupa 4 colunas (33.3%)</div>
            <div class="col-4">Esta ocupa 4 colunas (33.3%)</div>
            <div class="col-4">Esta ocupa 4 colunas (33.3%)</div>
        </div>
        <br><br><br>
        <div class="row">
            <!--Exemplo 03: Colunas desproporcionais-->
            <div class="col-8">Esta ocupa 8 colunas (conteúdo principal)</div>
            <div class="col-4">Esta ocupa 4 colunas (barra lateral)</div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.js"></script>
</body>

</html>
