<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>200226</title>
</head>
<body>
    <script type="text/javascript">
        const idade = 20; //geralmente variaveis são definidas no topo do script
        let nome = "leticia";
      
        alert("Alô mundo"); //esse faz um pop-up na seta com botãozinho de ok para apertar
        console.log("Estamos passando por uma sensu..."); //esse va aparecer somente se você apertar f12 no "console"
        
        alert("Sua idade é"); //aqui ele aparece
        alert(idade); //separado!!

        alert("Sua idade é " + idade + " e seu nome é " + nome); //este "junta" o texto com a "texto" da variavel
        //tem que dar um espaço antes e depois das "" pois a variáve literalmente só cola

        alert(`${nome} sua idade é ${idade}`); //aqui ele vai com crase `` e o 

        idade = 21; //testando para mostrar erros - aparece lá na aba console
        //caso queira que a variável assuma vários valores usar let lá em cima 
        //ex - let idade = 21; depois pode alterar S

    </script>
</body>
</html>
